name: Build and Release Linux Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install Node dependencies
        working-directory: ./dashboard
        run: |
          npm ci
          npm install @tauri-apps/cli

      - name: Build Linux artifacts
        working-directory: ./dashboard
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD not needed — key was generated without passphrase
        run: npx tauri build --bundles appimage,deb,rpm

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: "ProjexNexa ${{ github.ref_name }}"
          body: |
            ### Linux Release
            - **AppImage**: Universal, runs on any distro (recommended for Arch)
            - **.deb**: Debian / Ubuntu
            - **.rpm**: RHEL / Fedora
          files: |
            dashboard/src-tauri/target/release/bundle/appimage/*.AppImage
            dashboard/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            dashboard/src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            dashboard/src-tauri/target/release/bundle/deb/*.deb
            dashboard/src-tauri/target/release/bundle/rpm/*.rpm
          draft: false
          prerelease: false
